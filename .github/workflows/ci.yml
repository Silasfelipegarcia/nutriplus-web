name: CI

on:
  push:
    branches: [main, master, develop, homolog]
  pull_request:
    branches: [main, master, develop, homolog]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
